
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center w-100 ">
    <div class="bg-white p-6 rounded-lg">
    <div class="flex justify-between items-center mb-8">
        <h2 class="text-lg font-bold text-gray-800">Notification center</h2>
        <span class="inline-flex items-right bg-blue-100 text-blue-700 px-4 py-1 
        rounded-full text-sm font-bold">3 New</span>
    </div>
    <div class="bg-red-100 border-l-4 border-red-500 p-5 rounded-lg mb-5">
        <h3 class="font-bold text-red-700 mb-2">Action required</h3>
        <p class="text-red-600 leading-relaxed">
            Your last payment attempt failed.
            Please update your payment method to avoid service interruption.
        </p>
    </div>
    <div class="bg-yellow-100 border-l-4 border-yellow-500 p-5 rounded-lg mb-6">
        <h3 class="font-bold text-yellow-700 mb-2">
            Maintainance Notice
        </h3>
        <p class="text-yellow-400 leading-relaxed">
            The system will undergo maintainance tonight. Some features may be temporarily unavailable.
        </p>
    </div>
        <div class="flex gap-4">
        <button class="bg-blue-700 hover:bg-green-600 text-white px-6 py-3 rounded-lg">
        View all
        </button>
    <button class="bg-white-500 hover:bg-gray-600 text-black px-6 py-3 rounded-lg">
        Dismiss
    </button>
    </div>
    </div>
</body>
</html>
